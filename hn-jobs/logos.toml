[project]
name = "hn-jobs"

# NOTE: a frontend-backend divide. Logos today supports ONE [typescript] root,
# so this three-root shape is itself a compiler gap to close (see SPEC.md).
#
# shared/   — the data-model contract, imported by both tiers (not generated)
# backend/  — server stubs: pure transforms + @service / @store workers
# frontend/ — React component stubs (@renders)

[typescript.shared]
root = "shared"

[typescript.backend]
root = "backend"

[typescript.frontend]
root = "frontend"
