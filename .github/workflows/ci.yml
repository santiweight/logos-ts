name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Enable PNPM
        run: |
          corepack enable pnpm
          corepack prepare pnpm@11.8.0 --activate

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            logos-ts/pnpm-lock.yaml
            logos-ts/studio/pnpm-lock.yaml
            investment-portfolio/frontend/pnpm-lock.yaml
            vinyl-collection/frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: |
          pnpm --dir logos-ts install --frozen-lockfile
          pnpm --dir logos-ts/studio install --frozen-lockfile
          pnpm --dir investment-portfolio/frontend install --frozen-lockfile
          pnpm --dir vinyl-collection/frontend install --frozen-lockfile

      - name: Typecheck Logos core
        run: pnpm --dir logos-ts run typecheck

      - name: Install Playwright browsers
        run: pnpm --dir logos-ts exec playwright install --with-deps chromium

      - name: Test Logos core
        run: pnpm --dir logos-ts test -- --run

      - name: Typecheck Studio
        run: pnpm --dir logos-ts/studio run typecheck

      - name: Test Studio
        working-directory: logos-ts/studio
        run: |
          pnpm exec vitest run ChangesRail.test.tsx
          pnpm exec vitest run --config vitest.integration.config.ts workspace-api.integration.test.ts
          pnpm exec vitest run --config vitest.integration.config.ts workspace-storybook.integration.test.ts

      - name: Run sample app healthchecks
        run: |
          cd investment-portfolio
          node scripts/healthcheck.mjs
          cd ../vinyl-collection
          node scripts/healthcheck.mjs

      - name: Typecheck sample frontends
        run: |
          pnpm --dir investment-portfolio/frontend run typecheck
          pnpm --dir vinyl-collection/frontend run typecheck
