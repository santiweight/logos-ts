name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck Logos core
        run: pnpm --dir logos-ts typecheck

      - name: Install Playwright browsers
        run: pnpm --dir logos-ts exec playwright install --with-deps chromium

      - name: Test Logos core
        run: pnpm --dir logos-ts test -- --run

      - name: Typecheck Studio
        run: pnpm --dir logos-ts/studio typecheck

      - name: Test Studio
        working-directory: logos-ts/studio
        run: |
          pnpm test -- ChangesRail.test.tsx
          pnpm test:integration -- workspace-api.integration.test.ts
          pnpm test:integration -- workspace-storybook.integration.test.ts

      - name: Run sample app healthchecks
        run: |
          cd investment-portfolio
          node scripts/healthcheck.mjs
          cd ../vinyl-collection
          node scripts/healthcheck.mjs

      - name: Typecheck sample frontends
        run: |
          pnpm --dir investment-portfolio/frontend typecheck
          pnpm --dir vinyl-collection/frontend typecheck
