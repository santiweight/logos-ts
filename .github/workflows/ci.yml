name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            logos-ts/package-lock.json
            logos-ts/studio/package-lock.json
            hn-jobs/package-lock.json
            hn-jobs/frontend/package-lock.json

      - name: Install dependencies
        run: |
          npm ci --prefix logos-ts
          npm ci --prefix logos-ts/studio
          npm ci --prefix hn-jobs
          npm ci --prefix hn-jobs/frontend

      - name: Typecheck Logos core
        run: npm run typecheck --prefix logos-ts

      - name: Test Logos core
        run: npm test --prefix logos-ts -- --run

      - name: Typecheck Studio
        run: npm run typecheck --prefix logos-ts/studio

      - name: Test Studio
        run: npm test --prefix logos-ts/studio -- --run

      - name: Run sample app healthcheck
        run: node scripts/healthcheck.mjs
        working-directory: hn-jobs

      - name: Typecheck sample frontend
        run: npm run typecheck --prefix hn-jobs/frontend
