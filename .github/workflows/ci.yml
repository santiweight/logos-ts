name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            logos-ts/package-lock.json
            logos-ts/studio/package-lock.json
            investment-portfolio/frontend/package-lock.json
            vinyl-collection/frontend/package-lock.json

      - name: Install dependencies
        run: |
          npm ci --prefix logos-ts
          npm ci --prefix logos-ts/studio
          npm ci --prefix investment-portfolio/frontend
          npm ci --prefix vinyl-collection/frontend

      - name: Typecheck Logos core
        run: npm run typecheck --prefix logos-ts

      - name: Test Logos core
        run: npm test --prefix logos-ts -- --run

      - name: Typecheck Studio
        run: npm run typecheck --prefix logos-ts/studio

      - name: Test Studio
        working-directory: logos-ts/studio
        run: |
          npm test -- ChangesRail.test.tsx
          npm run test:integration -- workspace-api.integration.test.ts
          npm run test:integration -- workspace-storybook.integration.test.ts

      - name: Run sample app healthchecks
        run: |
          cd investment-portfolio
          node scripts/healthcheck.mjs
          cd ../vinyl-collection
          node scripts/healthcheck.mjs

      - name: Typecheck sample frontends
        run: |
          npm run typecheck --prefix investment-portfolio/frontend
          npm run typecheck --prefix vinyl-collection/frontend
